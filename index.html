<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HIROBOT — Menghubungkan...</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #f1f5f9;
  }
  .card {
    text-align: center;
    padding: 2.5rem 2rem;
    max-width: 380px;
  }
  .spinner {
    width: 44px;
    height: 44px;
    margin: 0 auto 1.5rem;
    border: 4px solid rgba(255,255,255,0.15);
    border-top-color: #38bdf8;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  h1 { font-size: 1.1rem; font-weight: 600; margin: 0 0 0.5rem; }
  p { font-size: 0.9rem; color: #94a3b8; margin: 0; line-height: 1.5; }
  .error { color: #f87171; }
  a.manual {
    display: none;
    margin-top: 1rem;
    color: #38bdf8;
    text-decoration: none;
    font-size: 0.85rem;
    word-break: break-all;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="spinner" id="spinner"></div>
    <h1 id="status">Menghubungkan ke server HIROBOT...</h1>
    <p id="detail">Mengambil URL tunnel terbaru, mohon tunggu sebentar.</p>
    <a class="manual" id="manualLink" href="#">Klik di sini jika tidak dialihkan otomatis</a>
  </div>

<script>
  // PENTING: ini HARUS repo bot-nya (hirobot), BUKAN repo hiroosy.github.io
  // ini sendiri — kalau dipakai repo Pages sendiri, GitHub bisa override
  // field "homepage" balik ke URL Pages, jadi looping redirect ke diri sendiri.
  const GIT_USER = "hiroosy";
  const GIT_REPO = "hirobot";

  const statusEl = document.getElementById("status");
  const detailEl = document.getElementById("detail");
  const spinnerEl = document.getElementById("spinner");
  const manualEl = document.getElementById("manualLink");

  function showError(msg) {
    spinnerEl.style.display = "none";
    statusEl.textContent = "Gagal menghubungkan";
    statusEl.classList.add("error");
    detailEl.textContent = msg;
  }

  fetch(`https://api.github.com/repos/${GIT_USER}/${GIT_REPO}`, {
    headers: { "Accept": "application/vnd.github.v3+json" }
  })
    .then(res => {
      if (!res.ok) throw new Error("HTTP " + res.status);
      return res.json();
    })
    .then(data => {
      const url = data.homepage && data.homepage.trim();
      if (!url) {
        showError("URL server belum tersedia. Coba lagi beberapa saat lagi.");
        return;
      }
      detailEl.textContent = "Server ditemukan, mengalihkan...";
      manualEl.href = url;
      manualEl.style.display = "inline-block";
      setTimeout(() => { location.replace(url); }, 600);
    })
    .catch(err => {
      showError("Tidak bisa mengambil info server (" + err.message + "). Periksa koneksi internet kamu.");
    });
</script>
</body>
</html>
